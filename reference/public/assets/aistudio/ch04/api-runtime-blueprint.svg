<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="98" y1="42" x2="1498" y2="878" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EDF4FF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C4175A"/>
      <stop offset="1" stop-color="#8E2DE2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F8FF"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#18355C" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="32" fill="url(#bg)"/>
  <rect x="40" y="36" width="1520" height="848" rx="28" fill="white" stroke="#D7E4F7"/>

  <rect x="64" y="62" width="158" height="38" rx="19" fill="#EEF4FF" stroke="#D4E2F8"/>
  <text x="143" y="87" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#1C5FC2">CH04 CONCEPT</text>
  <text x="64" y="148" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="46" font-weight="700" fill="#172B4D">LLM 앱과 API는 이렇게 연결된다</text>
  <text x="64" y="188" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="500" fill="#537093">AI Studio Build로 내려받은 앱도 모델을 품고 있는 것이 아니라, API key와 함께 원격 Gemini API를 호출하는 클라이언트다.</text>

  <g filter="url(#shadow)">
    <rect x="64" y="236" width="320" height="184" rx="28" fill="url(#card)" stroke="#D8E4F6"/>
    <rect x="402" y="236" width="320" height="184" rx="28" fill="url(#card)" stroke="#D8E4F6"/>
    <rect x="740" y="236" width="320" height="184" rx="28" fill="url(#card)" stroke="#D8E4F6"/>
    <rect x="1078" y="236" width="432" height="184" rx="28" fill="url(#card)" stroke="#D8E4F6"/>
  </g>

  <circle cx="114" cy="286" r="28" fill="#17355F"/>
  <text x="114" y="295" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="26" font-weight="700" fill="white">1</text>
  <text x="158" y="284" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="28" font-weight="700" fill="#17355F">사용자와 자료</text>
  <text x="96" y="330" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">질문, 회의록, PDF, 이미지,</text>
  <text x="96" y="360" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">오디오 같은 컨텍스트를 넣는다.</text>
  <text x="96" y="394" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="19" font-weight="600" fill="#1F5FB4">입력 품질이 결과 품질을 결정</text>

  <circle cx="452" cy="286" r="28" fill="#17355F"/>
  <text x="452" y="295" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="26" font-weight="700" fill="white">2</text>
  <text x="496" y="284" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="28" font-weight="700" fill="#17355F">로컬 앱 / Build export</text>
  <text x="434" y="330" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">브라우저나 로컬 서버에서 실행된다.</text>
  <text x="434" y="360" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">하지만 모델 자체를 포함하지는 않는다.</text>
  <text x="434" y="394" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="19" font-weight="600" fill="#1F5FB4">앱은 요청을 보내는 프런트엔드/클라이언트</text>

  <circle cx="790" cy="286" r="28" fill="#17355F"/>
  <text x="790" y="295" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="26" font-weight="700" fill="white">3</text>
  <text x="834" y="284" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="28" font-weight="700" fill="#17355F">Gemini API + API key</text>
  <text x="772" y="330" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">누가 호출했는지 인증하고,</text>
  <text x="772" y="360" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">어느 프로젝트의 quota와 billing에</text>
  <text x="772" y="390" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">연결할지 결정한다.</text>

  <circle cx="1128" cy="286" r="28" fill="url(#brand)"/>
  <text x="1128" y="295" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="26" font-weight="700" fill="white">4</text>
  <text x="1172" y="284" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="28" font-weight="700" fill="#17355F">모델 추론과 결과 반환</text>
  <text x="1110" y="330" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">Gemini가 추론을 수행하고 답변, 요약,</text>
  <text x="1110" y="360" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">코드, 구조화 출력, grounding 결과를</text>
  <text x="1110" y="390" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#47607E">다시 앱 UI로 돌려준다.</text>

  <path d="M384 328H402" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>
  <path d="M384 328L396 318" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>
  <path d="M384 328L396 338" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>

  <path d="M722 328H740" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>
  <path d="M722 328L734 318" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>
  <path d="M722 328L734 338" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>

  <path d="M1060 328H1078" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>
  <path d="M1060 328L1072 318" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>
  <path d="M1060 328L1072 338" stroke="#A1B7D7" stroke-width="10" stroke-linecap="round"/>

  <rect x="64" y="454" width="970" height="376" rx="28" fill="#F8FBFF" stroke="#D8E4F6"/>
  <text x="98" y="506" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="30" font-weight="700" fill="#17355F">왜 key와 quota, billing을 알아야 하나</text>
  <text x="98" y="542" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#57728F">Chat UI에서는 숨겨져 있던 운영 원리가, API 방식에서는 그대로 드러난다.</text>

  <rect x="96" y="574" width="420" height="106" rx="22" fill="white" stroke="#D6E2F5"/>
  <rect x="96" y="698" width="420" height="106" rx="22" fill="white" stroke="#D6E2F5"/>
  <rect x="542" y="574" width="460" height="106" rx="22" fill="white" stroke="#D6E2F5"/>
  <rect x="542" y="698" width="460" height="106" rx="22" fill="white" stroke="#D6E2F5"/>

  <text x="122" y="618" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="700" fill="#17355F">왜 과금되나</text>
  <text x="122" y="652" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">토큰 처리, 추론 계산, grounding/도구 호출처럼</text>
  <text x="122" y="680" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">원격 연산 자원이 실제로 소비되기 때문이다.</text>

  <text x="122" y="742" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="700" fill="#17355F">왜 로컬 실행에도 key가 필요한가</text>
  <text x="122" y="776" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">다운받은 앱은 모델을 복제한 파일이 아니라</text>
  <text x="122" y="804" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">Gemini 서비스를 호출하는 클라이언트이기 때문이다.</text>

  <text x="568" y="618" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="700" fill="#17355F">key가 담당하는 것</text>
  <text x="568" y="652" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">인증, 프로젝트 식별, 사용량 집계, quota 배정,</text>
  <text x="568" y="680" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">허용 모델/기능 접근과 유출 추적의 기준점이 된다.</text>

  <text x="568" y="742" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="700" fill="#17355F">보통 무엇을 설정하나</text>
  <text x="568" y="776" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">모델 선택, API key 환경변수, 프로젝트,</text>
  <text x="568" y="804" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="500" fill="#4C6683">rate limit, source data, 비공개 저장 정책.</text>

  <rect x="1062" y="454" width="474" height="376" rx="28" fill="#17355F"/>
  <text x="1102" y="506" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="30" font-weight="700" fill="white">오늘 수업에서 기억할 것</text>
  <text x="1102" y="544" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="21" font-weight="500" fill="#CFDBEE">핵심은 복잡한 발급 절차보다, API 방식의 의미를 이해하는 데 있다.</text>

  <rect x="1102" y="580" width="394" height="54" rx="16" fill="#264A7B"/>
  <rect x="1102" y="648" width="394" height="54" rx="16" fill="#264A7B"/>
  <rect x="1102" y="716" width="394" height="54" rx="16" fill="#264A7B"/>
  <text x="1130" y="615" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="600" fill="white">1. Chat UI와 API 앱은 같은 모델을 다른 인터페이스로 쓴다.</text>
  <text x="1130" y="683" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="600" fill="white">2. API key는 로그인 비슷한 출입증이자 과금·quota의 기준이다.</text>
  <text x="1130" y="751" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="20" font-weight="600" fill="white">3. Build 앱을 내려받아도 `GEMINI_API_KEY` 같은 연결 정보가 필요하다.</text>

  <text x="1102" y="804" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#CFDBEE">실습 포인트: 오늘은 원리를 이해하고, 이후 필요할 때만 키를 발급해 연결한다.</text>
</svg>
