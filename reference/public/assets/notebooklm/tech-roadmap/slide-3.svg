<svg width="1376" height="768" viewBox="0 0 1376 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="86" y1="60" x2="1296" y2="712" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <linearGradient id="ink3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#183E73"/>
      <stop offset="1" stop-color="#2E6EC8"/>
    </linearGradient>
    <style>
      .title { font: 700 38px 'Pretendard','Noto Sans KR',sans-serif; fill: #122B54; }
      .subtitle { font: 500 19px 'Pretendard','Noto Sans KR',sans-serif; fill: #466183; }
      .kicker { font: 700 17px 'Pretendard','Noto Sans KR',sans-serif; fill: #1A63CA; letter-spacing: 0.08em; text-transform: uppercase; }
      .section { font: 700 22px 'Pretendard','Noto Sans KR',sans-serif; fill: #15345F; }
      .body { font: 500 18px 'Pretendard','Noto Sans KR',sans-serif; fill: #3C5578; }
      .strong { font: 700 18px 'Pretendard','Noto Sans KR',sans-serif; fill: #173C69; }
      .white { font: 700 18px 'Pretendard','Noto Sans KR',sans-serif; fill: #FFFFFF; }
      .pill { font: 700 17px 'Pretendard','Noto Sans KR',sans-serif; fill: #184D95; }
      .tiny { font: 600 15px 'Pretendard','Noto Sans KR',sans-serif; fill: #607796; }
      .mono { font: 600 16px 'JetBrains Mono','Consolas',monospace; fill: #EAF3FF; }
    </style>
  </defs>

  <rect width="1376" height="768" rx="32" fill="url(#bg3)"/>
  <rect x="56" y="48" width="1264" height="672" rx="32" fill="#FFFFFF" stroke="#D4E1F7"/>

  <text x="96" y="110" class="kicker">NotebookLM Concept Deck</text>
  <text x="96" y="160" class="title">CLI / Agent | Codex와 Cline으로 에이전틱 워크플로우를 시연</text>
  <text x="96" y="198" class="subtitle">터미널을 시작점으로 계획, 도구 호출, 실행, 검증, 수정을 스스로 이어가는 agentic workflow</text>

  <rect x="92" y="248" width="324" height="382" rx="30" fill="#112B4F"/>
  <text x="126" y="292" class="white">Terminal Interface</text>
  <text x="126" y="334" class="mono">$ codex solve issue --with-tests</text>
  <text x="126" y="372" class="mono">&gt; plan repo scan</text>
  <text x="126" y="404" class="mono">&gt; edit files</text>
  <text x="126" y="436" class="mono">&gt; run checks</text>
  <text x="126" y="468" class="mono">&gt; iterate</text>
  <rect x="126" y="510" width="118" height="40" rx="16" fill="#1F538F"/>
  <text x="160" y="536" class="white">Codex</text>
  <rect x="256" y="510" width="118" height="40" rx="16" fill="#2F6EC8"/>
  <text x="292" y="536" class="white">Cline</text>
  <text x="126" y="584" class="tiny">CLI는 에이전트에게 도구와 실행 권한을 건네는 인터페이스</text>

  <path d="M446 434H526" stroke="#4C8EEA" stroke-width="10" stroke-linecap="round"/>
  <path d="M504 418L530 434L504 450" fill="none" stroke="#4C8EEA" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <polygon points="688,256 824,336 824,496 688,576 552,496 552,336" fill="url(#ink3)"/>
  <text x="634" y="394" class="white">Harness</text>
  <text x="596" y="430" class="white">Agentic workflow</text>
  <text x="594" y="466" class="white">plan → act → observe</text>

  <rect x="572" y="230" width="112" height="42" rx="18" fill="#EAF3FF" stroke="#BED4F7"/>
  <text x="609" y="257" class="strong">계획</text>
  <rect x="820" y="304" width="132" height="42" rx="18" fill="#EAF3FF" stroke="#BED4F7"/>
  <text x="850" y="331" class="strong">도구 호출</text>
  <rect x="842" y="476" width="118" height="42" rx="18" fill="#EAF3FF" stroke="#BED4F7"/>
  <text x="880" y="503" class="strong">실행</text>
  <rect x="424" y="476" width="118" height="42" rx="18" fill="#EAF3FF" stroke="#BED4F7"/>
  <text x="454" y="503" class="strong">수정</text>
  <rect x="430" y="304" width="118" height="42" rx="18" fill="#EAF3FF" stroke="#BED4F7"/>
  <text x="452" y="331" class="strong">검증</text>

  <rect x="972" y="248" width="298" height="382" rx="30" fill="#F7FAFF" stroke="#D7E3F7"/>
  <text x="1006" y="292" class="section">에이전트가 다루는 작업 표면</text>
  <rect x="1006" y="330" width="226" height="58" rx="18" fill="#FFFFFF" stroke="#C9DAF7"/>
  <text x="1052" y="366" class="strong">코드 저장소</text>
  <rect x="1006" y="406" width="226" height="58" rx="18" fill="#FFFFFF" stroke="#C9DAF7"/>
  <text x="1050" y="442" class="strong">터미널 / 셸</text>
  <rect x="1006" y="482" width="226" height="58" rx="18" fill="#FFFFFF" stroke="#C9DAF7"/>
  <text x="1050" y="518" class="strong">브라우저 / 문서</text>
  <rect x="1006" y="558" width="226" height="58" rx="18" fill="#FFFFFF" stroke="#C9DAF7"/>
  <text x="1058" y="594" class="strong">테스트 / 로그</text>
  <text x="1008" y="648" class="tiny">복잡한 문제를 작은 작업으로 쪼개고, 실패를 보며 다시 수정</text>

  <rect x="96" y="648" width="164" height="44" rx="22" fill="#EBF4FF" stroke="#C8DAF7"/>
  <text x="146" y="677" class="pill">Codex</text>
  <rect x="278" y="648" width="160" height="44" rx="22" fill="#EBF4FF" stroke="#C8DAF7"/>
  <text x="330" y="677" class="pill">Cline</text>
  <rect x="456" y="648" width="204" height="44" rx="22" fill="#EBF4FF" stroke="#C8DAF7"/>
  <text x="502" y="677" class="pill">Terminal / Tool use</text>
  <text x="834" y="675" class="tiny">오늘 시연: 강사가 Codex와 Cline으로 자율 문제 해결 흐름을 직접 보여준다</text>
</svg>
